name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}
      - name: Install
        run: uv sync --all-extras
      - name: Regenerate schemas
        run: uv run python scripts/gen_schemas.py
      - name: Check schemas are committed up to date
        run: |
          if [[ -n "$(git status --porcelain spec/contracts)" ]]; then
            echo "spec/contracts is stale — run scripts/gen_schemas.py"
            git diff spec/contracts
            exit 1
          fi
      - name: Lint
        run: uv run ruff check
      - name: Type check
        run: uv run pyright
      - name: Tests
        run: uv run pytest --cov=readerfriction --cov-report=term-missing
      - name: Smoke (wrapper-chain fixture)
        run: uv run rf scan spec/examples/wrapper-chain/project --format json
